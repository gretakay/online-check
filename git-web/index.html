<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>手機簽到 Git 版</title>
  <style>
    :root {
      --bg: #ecf5f1;
      --card: #fff;
      --line: #d6e3dc;
      --text: #1f2a36;
      --sub: #607283;
      --ok: #0c7a5b;
      --ok2: #13a06d;
      --err: #b34444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f8f4e9 0%, var(--bg) 100%);
      min-height: 100vh;
      padding: 12px;
    }

    .wrap { max-width: 620px; margin: 0 auto; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, .08);
    }

    h1 { margin: 0; font-size: 26px; }
    .sub { margin: 8px 0 14px; color: var(--sub); font-size: 13px; }
    .field { display: grid; gap: 6px; margin-bottom: 10px; }
    label { font-weight: 700; font-size: 14px; }

    input, button {
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 10px 12px;
      font-size: 15px;
      min-height: 44px;
    }

    button {
      border: none;
      color: #fff;
      font-weight: 700;
      background: linear-gradient(135deg, var(--ok), var(--ok2));
      cursor: pointer;
    }

    button.secondary {
      background: #f4f7f6;
      color: var(--text);
      border: 1px solid var(--line);
    }

    button:disabled { opacity: .55; cursor: not-allowed; }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .scanner {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      background: #fafdfb;
      margin: 10px 0;
    }

    video {
      width: 100%;
      min-height: 180px;
      background: #111;
      border-radius: 10px;
      object-fit: cover;
      display: none;
    }

    .hint { margin-top: 8px; font-size: 12px; color: var(--sub); }

    .search-box {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 10px;
      margin-top: 10px;
    }

    .catalog-panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #f9fcfa;
      margin-top: 10px;
      display: grid;
      gap: 10px;
    }

    .catalog-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .catalog-list {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: #fff;
      min-height: 120px;
      max-height: 220px;
      overflow-y: auto;
    }

    .catalog-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--sub);
      margin-bottom: 8px;
    }

    .catalog-item {
      width: 100%;
      text-align: left;
      border: 1px solid #d8e5dd;
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 6px;
      background: #f6fbf8;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
    }

    .catalog-item:last-child {
      margin-bottom: 0;
    }

    .catalog-item strong {
      display: block;
      font-size: 13px;
      margin-bottom: 2px;
    }

    .catalog-item.selected {
      border-color: var(--ok);
      box-shadow: inset 0 0 0 1px var(--ok);
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-top: 8px;
    }

    .result-item {
      margin-top: 8px;
      width: 100%;
      text-align: left;
      background: #f6fbf8;
      border: 1px solid #cde0d5;
      color: var(--text);
    }

    .msg {
      margin-top: 10px;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      display: none;
      white-space: pre-wrap;
    }

    .msg.ok { display: block; background: #e7f7ef; color: #0c7a5b; }
    .msg.err { display: block; background: #fdecec; color: var(--err); }

    .mode-btn {
      flex: 1;
    }

    .mode-content {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .mode-btn.active {
      background: linear-gradient(135deg, var(--ok), var(--ok2));
      color: #fff;
    }

    .leader-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 12px 0;
    }

    .stat-box {
      background: linear-gradient(135deg, var(--ok), var(--ok2));
      color: #fff;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
    }

    .stat-label {
      font-size: 13px;
      margin-top: 4px;
      opacity: 0.9;
    }

    .filter-btn {
      padding: 8px 12px;
      font-size: 13px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      cursor: pointer;
      flex: 1;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, var(--ok), var(--ok2));
      color: #fff;
      border: none;
    }

    .station-strip {
      display: grid;
      gap: 8px;
    }

    .station-btn {
      width: 100%;
      text-align: left;
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
    }

    .station-btn.active {
      border: none;
      color: #fff;
      background: linear-gradient(135deg, #16548c, #2d8ac2);
    }

    .leader-actions {
      margin: 8px 0 2px;
    }

    .roster-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .member-pick {
      width: 20px;
      height: 20px;
      accent-color: var(--ok);
    }

    .member-main {
      min-width: 0;
    }

    .member-action {
      min-width: 94px;
      padding: 8px 10px;
      border-radius: 10px;
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--ok), var(--ok2));
    }

    .member-action.undo {
      background: linear-gradient(135deg, #b34444, #d86a6a);
    }

    .member-action:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .roster-list {
      margin-top: 12px;
      max-height: 400px;
      overflow-y: auto;
    }

    .roster-item {
      background: #f6fbf8;
      border: 1px solid #cde0d5;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .roster-item.arrived {
      border-left: 4px solid var(--ok);
      opacity: 0.7;
    }

    .roster-item.pending {
      border-left: 4px solid var(--err);
    }

    .roster-item.leave {
      border-left: 4px solid #f39c12;
      opacity: 0.7;
    }

    .roster-name {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .roster-info {
      color: var(--sub);
      font-size: 12px;
    }

    .roster-status {
      margin-top: 4px;
      font-size: 12px;
      font-weight: 700;
    }

    .roster-item.arrived .roster-status { color: var(--ok); }
    .roster-item.pending .roster-status { color: var(--err); }
    .roster-item.leave .roster-status { color: #f39c12; }

    @media (max-width: 520px) {
      .btn-row, .search-row { grid-template-columns: 1fr; }
      .catalog-grid { grid-template-columns: 1fr; }
      h1 { font-size: 22px; }
      .filter-btn { padding: 6px 10px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>手機簽到</h1>
      <p class="sub">Git 前端版，可直接串 Apps Script API</p>

      <div class="field">
        <label>模式選擇</label>
        <div class="btn-row">
          <button id="modeCheckin" type="button" class="mode-btn active">簽到</button>
          <button id="modeLeader" type="button" class="mode-btn secondary">領隊</button>
        </div>
      </div>

      <div class="field">
        <label>Deployment ID</label>
        <input id="deploymentId" value="AKfycbwu3SVkE13vOhTnaOCHiJ_hzVb8vQhrQEpX0OYkeH859-5Uk-rHLSEZhEBMSf4gdgxs" />
      </div>

      <!-- 簽到模式 -->
      <div id="checkinMode" class="mode-content">
        <div class="field">
          <label>活動代碼</label>
          <input id="eventCode" placeholder="例如 EVT20260623" />
        </div>

        <div class="field">
          <label>QR 內容</label>
          <input id="identifier" placeholder="掃描或貼上 QR 字串" />
        </div>

        <div class="scanner">
          <video id="video" playsinline muted></video>
          <div class="btn-row">
            <button id="btnStart" type="button">開始掃描</button>
            <button id="btnStop" type="button" class="secondary" disabled>停止掃描</button>
          </div>
          <div id="scanHint" class="hint">先按開始掃描，或手動貼上 QR 內容。</div>
        </div>

        <div class="btn-row">
          <button id="btnSubmit" type="button">手動送出</button>
          <button id="btnLoadEvents" type="button" class="secondary">讀取活動</button>
        </div>

        <div class="catalog-panel">
          <div class="catalog-head">
            <strong>可刷資料總覽</strong>
            <button id="btnLoadCatalog" type="button" class="secondary">更新總覽</button>
          </div>
          <div id="catalogSummary" class="hint">尚未載入總覽</div>
          <div class="catalog-grid">
            <div class="catalog-list">
              <div class="catalog-title">活動</div>
              <div id="catalogEvents"></div>
            </div>
            <div class="catalog-list">
              <div class="catalog-title">領隊</div>
              <div id="catalogLeaders"></div>
            </div>
            <div class="catalog-list">
              <div class="catalog-title">可刷人員</div>
              <div id="catalogPeople"></div>
            </div>
          </div>
        </div>

        <details class="search-box">
          <summary>依姓名搜尋</summary>
          <div class="search-row">
            <input id="nameQuery" placeholder="輸入姓名關鍵字" />
            <button id="btnSearch" type="button" class="secondary">搜尋</button>
          </div>
          <div id="searchResults"></div>
        </details>
      </div>

      <!-- 領隊模式 -->
      <div id="leaderMode" class="mode-content" style="display:none;">
        <div class="field">
          <label>領隊手機號碼</label>
          <div class="search-row">
            <input id="leaderPhone" placeholder="例如 0928014772" />
            <button id="btnVerifyLeader" type="button" class="secondary">驗證</button>
          </div>
        </div>

        <div id="leaderVerifying" style="display:none;">
          <p class="sub">驗證中...</p>
        </div>

        <div id="leaderVerified" style="display:none;">
          <div class="field">
            <label>選擇活動</label>
            <div id="leaderEvents"></div>
          </div>

          <div id="leaderSummaryContainer" style="display:none;">
            <div class="leader-stats">
              <div class="stat-box">
                <div class="stat-value" id="arrivedCount">0</div>
                <div class="stat-label">已到</div>
              </div>
              <div class="stat-box">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">總數</div>
              </div>
            </div>

            <div class="field">
              <label>篩選</label>
              <div class="btn-row" style="grid-template-columns: 1fr 1fr 1fr;">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="pending">未到</button>
                <button class="filter-btn" data-filter="arrived">已到</button>
              </div>
            </div>

            <div class="field">
              <label>站點</label>
              <div id="leaderStations" class="station-strip"></div>
            </div>

            <div class="btn-row leader-actions">
              <button id="btnMarkSelected" type="button" class="secondary">標記勾選為已到</button>
              <button id="btnSyncLeader" type="button" class="secondary">同步變更 (0)</button>
            </div>

            <div id="leaderRoster" class="roster-list"></div>
          </div>
        </div>
      </div>

      <div id="msg" class="msg"></div>
    </section>
  </main>

  <script>
    const eventCodeEl = document.getElementById('eventCode');
    const identifierEl = document.getElementById('identifier');
    const nameQueryEl = document.getElementById('nameQuery');
    const deploymentIdEl = document.getElementById('deploymentId');
    const videoEl = document.getElementById('video');
    const scanHintEl = document.getElementById('scanHint');
    const msgEl = document.getElementById('msg');
    const searchResultsEl = document.getElementById('searchResults');
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const btnSubmit = document.getElementById('btnSubmit');
    const btnSearch = document.getElementById('btnSearch');
    const btnLoadEvents = document.getElementById('btnLoadEvents');
    const btnLoadCatalog = document.getElementById('btnLoadCatalog');
    const catalogSummaryEl = document.getElementById('catalogSummary');
    const catalogEventsEl = document.getElementById('catalogEvents');
    const catalogLeadersEl = document.getElementById('catalogLeaders');
    const catalogPeopleEl = document.getElementById('catalogPeople');

    // 領隊模式相關元素
    const modeCheckinBtn = document.getElementById('modeCheckin');
    const modeLeaderBtn = document.getElementById('modeLeader');
    const checkinModeEl = document.getElementById('checkinMode');
    const leaderModeEl = document.getElementById('leaderMode');
    const leaderPhoneEl = document.getElementById('leaderPhone');
    const btnVerifyLeader = document.getElementById('btnVerifyLeader');
    const leaderVerifyingEl = document.getElementById('leaderVerifying');
    const leaderVerifiedEl = document.getElementById('leaderVerified');
    const leaderEventsEl = document.getElementById('leaderEvents');
    const leaderSummaryContainerEl = document.getElementById('leaderSummaryContainer');
    const arrivedCountEl = document.getElementById('arrivedCount');
    const totalCountEl = document.getElementById('totalCount');
    const leaderRosterEl = document.getElementById('leaderRoster');
    const leaderStationsEl = document.getElementById('leaderStations');
    const btnMarkSelected = document.getElementById('btnMarkSelected');
    const btnSyncLeader = document.getElementById('btnSyncLeader');

    let stream = null;
    let scanTimer = null;
    let selectedPersonId = '';
    let currentMode = 'checkin';
    let currentLeaderData = null;
    let currentEvent = null;
    let currentRollCallCode = '';
    let currentRollCallName = '';
    let currentFilter = 'all';
    let selectedIds = {};
    let pendingRecords = {};
    let currentCatalog = null;
    const launchParams = parseLaunchParams();

    bootstrap();

    function parseLaunchParams() {
      const params = new URLSearchParams(window.location.search || '');
      return {
        mode: String(params.get('mode') || '').trim().toLowerCase(),
        eventCode: String(params.get('eventCode') || '').trim(),
        rollCallCode: String(params.get('rollCallCode') || '').trim(),
        leaderPhone: String(params.get('leaderPhone') || params.get('leaderPhoneNumber') || '').trim()
      };
    }

    function getApiBase() {
      const id = String(deploymentIdEl.value || '').trim();
      return 'https://script.google.com/macros/s/' + id + '/exec';
    }

    async function bootstrap() {
      leaderPhoneEl.value = localStorage.getItem('leader_phone_number') || '';
      setupModeButtons();
      setupLeaderUI();
      await loadActiveEvents();
      await loadOpsCatalog();

      if (launchParams.eventCode) {
        eventCodeEl.value = launchParams.eventCode;
      }
      if (launchParams.leaderPhone) {
        leaderPhoneEl.value = launchParams.leaderPhone;
      }

      if (launchParams.mode === 'leader') {
        switchMode('leader');
        if (leaderPhoneEl.value.trim()) {
          await verifyLeader();
        }
      }

      updateLeaderActionUi();
    }

    function setupModeButtons() {
      modeCheckinBtn.addEventListener('click', () => switchMode('checkin'));
      modeLeaderBtn.addEventListener('click', () => switchMode('leader'));
    }

    function switchMode(mode) {
      currentMode = mode;
      if (mode === 'checkin') {
        checkinModeEl.style.display = 'block';
        leaderModeEl.style.display = 'none';
        modeCheckinBtn.classList.add('active');
        modeLeaderBtn.classList.remove('active');
      } else {
        checkinModeEl.style.display = 'none';
        leaderModeEl.style.display = 'block';
        modeCheckinBtn.classList.remove('active');
        modeLeaderBtn.classList.add('active');
      }
    }

    function setupLeaderUI() {
      btnVerifyLeader.addEventListener('click', verifyLeader);
      leaderPhoneEl.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          e.preventDefault();
          verifyLeader();
        }
      });

      btnMarkSelected.addEventListener('click', markSelectedAsArrived);
      btnSyncLeader.addEventListener('click', syncLeaderChanges);

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentFilter = btn.dataset.filter;
          renderLeaderRoster();
        });
      });
    }

    btnStart.addEventListener('click', startScan);
    btnStop.addEventListener('click', stopScan);
    btnSubmit.addEventListener('click', () => submitCheckin(false));
    btnSearch.addEventListener('click', doSearch);
    btnLoadEvents.addEventListener('click', loadActiveEvents);
    btnLoadCatalog.addEventListener('click', () => loadOpsCatalog());

    eventCodeEl.addEventListener('change', () => loadOpsCatalog());
    identifierEl.addEventListener('input', () => {
      if (identifierEl.value.trim() !== selectedPersonId) {
        selectedPersonId = '';
      }
    });

    nameQueryEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        doSearch();
      }
    });

    function setMessage(type, text) {
      msgEl.className = 'msg ' + type;
      msgEl.textContent = text;
    }

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const cbName = '__cb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        const script = document.createElement('script');
        const timer = setTimeout(() => {
          cleanup();
          reject(new Error('JSONP timeout'));
        }, 15000);

        function cleanup() {
          clearTimeout(timer);
          delete window[cbName];
          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        window[cbName] = data => {
          cleanup();
          resolve(data);
        };

        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + encodeURIComponent(cbName);
        script.onerror = () => {
          cleanup();
          reject(new Error('JSONP script load failed'));
        };
        document.body.appendChild(script);
      });
    }

    async function apiCall(params) {
      const q = new URLSearchParams({ api: '1', ...params });
      const url = getApiBase() + '?' + q.toString();
      return jsonp(url);
    }

    async function loadActiveEvents() {
      setMessage('ok', '載入活動中...');
      try {
        const res = await apiCall({ intent: 'active_events' });
        if (!res.ok) throw new Error(res.message || 'active_events 失敗');
        const items = (res.data && res.data.items) || [];
        if (res.data && res.data.preferredEventCode) {
          eventCodeEl.value = res.data.preferredEventCode;
        } else if (items[0]) {
          eventCodeEl.value = items[0].eventCode;
        }
        setMessage('ok', '就緒，可直接掃描或手動送出');
      } catch (e) {
        setMessage('err', '載入活動失敗: ' + e.message);
      }
    }

    async function doSearch() {
      const eventCode = eventCodeEl.value.trim();
      const nameQuery = nameQueryEl.value.trim();
      if (!eventCode || !nameQuery) {
        setMessage('err', '請輸入活動代碼與姓名關鍵字');
        return;
      }

      btnSearch.disabled = true;
      searchResultsEl.innerHTML = '';
      setMessage('ok', '搜尋中...');

      try {
        const res = await apiCall({
          intent: 'search',
          eventCode,
          nameQuery
        });
        if (!res.ok) throw new Error(res.message || res.code || '搜尋失敗');
        renderSearchResults((res.data && res.data.items) || []);
        setMessage('ok', '請點選正確人員');
      } catch (e) {
        setMessage('err', '搜尋失敗: ' + e.message);
      } finally {
        btnSearch.disabled = false;
      }
    }

    async function loadOpsCatalog() {
      const eventCode = eventCodeEl.value.trim();
      btnLoadCatalog.disabled = true;
      catalogSummaryEl.textContent = '總覽載入中...';

      try {
        const res = await apiCall({
          intent: 'ops_catalog',
          eventCode
        });
        if (!res.ok) throw new Error(res.message || '載入總覽失敗');
        currentCatalog = (res.data || null);
        renderCatalog(currentCatalog);
      } catch (e) {
        catalogSummaryEl.textContent = '載入失敗: ' + e.message;
      } finally {
        btnLoadCatalog.disabled = false;
      }
    }

    function renderCatalog(data) {
      const summary = data && data.summary ? data.summary : { events: 0, leaders: 0, stations: 0, people: 0 };
      const selectedEventCode = String((data && data.selectedEventCode) || '').trim();

      catalogSummaryEl.textContent =
        '活動 ' + summary.events + ' / 領隊 ' + summary.leaders + ' / 站點 ' + summary.stations + ' / 可刷人員 ' + summary.people;

      catalogEventsEl.innerHTML = '';
      catalogLeadersEl.innerHTML = '';
      catalogPeopleEl.innerHTML = '';

      const eventFrag = document.createDocumentFragment();
      ((data && data.events) || []).forEach(event => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'catalog-item' + (event.eventCode === selectedEventCode ? ' selected' : '');
        btn.innerHTML = '<strong>' + escapeHtml(event.eventName || event.eventCode) + '</strong>' +
          '<div>' + escapeHtml(event.eventCode || '') + '</div>' +
          '<div>狀態: ' + escapeHtml(event.status || '-') + '</div>';
        btn.addEventListener('click', async () => {
          eventCodeEl.value = event.eventCode || '';
          await loadOpsCatalog();
        });
        eventFrag.appendChild(btn);
      });
      if (!eventFrag.childNodes.length) {
        catalogEventsEl.innerHTML = '<div class="hint">目前無啟用活動</div>';
      } else {
        catalogEventsEl.appendChild(eventFrag);
      }

      const leaderFrag = document.createDocumentFragment();
      ((data && data.leaders) || []).forEach(leader => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'catalog-item';
        const phone = leader.leaderPhoneNumber || '(未設定電話)';
        btn.innerHTML = '<strong>' + escapeHtml(phone) + '</strong>' +
          '<div>活動: ' + String((leader.eventCodes || []).length) + '</div>' +
          '<div>站點: ' + String((leader.stations || []).length) + '</div>';
        btn.addEventListener('click', () => {
          switchMode('leader');
          leaderPhoneEl.value = leader.leaderPhoneNumber || '';
        });
        leaderFrag.appendChild(btn);
      });
      if (!leaderFrag.childNodes.length) {
        catalogLeadersEl.innerHTML = '<div class="hint">目前無領隊資料</div>';
      } else {
        catalogLeadersEl.appendChild(leaderFrag);
      }

      const peopleFrag = document.createDocumentFragment();
      ((data && data.people) || []).forEach(person => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'catalog-item';
        const rollCallLabel = (person.rollCalls || []).slice(0, 2).map(r => r.rollCallCode).join(', ');
        const canScanText = person.canScan ? '可掃 QR' : '無 QR';
        btn.innerHTML = '<strong>' + escapeHtml(person.personName || person.personId) + '</strong>' +
          '<div>' + escapeHtml(person.personId || '') + ' | ' + escapeHtml(canScanText) + '</div>' +
          '<div>' + escapeHtml(rollCallLabel || '無站點') + '</div>';
        btn.addEventListener('click', () => {
          selectedPersonId = person.personId;
          identifierEl.value = person.personId;
          switchMode('checkin');
          setMessage('ok', '已選取 ' + (person.personName || person.personId) + '，可直接手動送出或掃 QR');
        });
        peopleFrag.appendChild(btn);
      });
      if (!peopleFrag.childNodes.length) {
        catalogPeopleEl.innerHTML = '<div class="hint">此活動尚無可刷人員</div>';
      } else {
        catalogPeopleEl.appendChild(peopleFrag);
      }
    }

    function renderSearchResults(items) {
      if (!items.length) {
        searchResultsEl.innerHTML = '<div class="hint">查無資料</div>';
        return;
      }

      const frag = document.createDocumentFragment();
      items.forEach(item => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'result-item';
        btn.textContent = item.name + ' (' + item.personId + ')';
        btn.addEventListener('click', () => {
          selectedPersonId = item.personId;
          identifierEl.value = item.personId;
          setMessage('ok', '已選取: ' + item.name);
        });
        frag.appendChild(btn);
      });
      searchResultsEl.appendChild(frag);
    }

    async function submitCheckin(isAuto) {
      const eventCode = eventCodeEl.value.trim();
      const identifier = identifierEl.value.trim();
      if (!eventCode || !identifier) {
        setMessage('err', '請先填活動代碼與 QR 內容');
        return;
      }

      btnSubmit.disabled = true;
      if (!isAuto) setMessage('ok', '送出中...');

      try {
        const now = new Date().toISOString();
        const res = await apiCall({
          intent: 'submit',
          requestId: 'r_' + randHex(),
          eventCode,
          identifierType: selectedPersonId ? 'personid' : 'qrcode',
          identifier,
          nonce: 'n_' + randHex(),
          clientTimestamp: now,
          deviceId: getDeviceId(),
          source: 'git-static-web',
          userAgent: navigator.userAgent
        });

        if (!res.ok) throw new Error((res.message || '送出失敗') + ' (' + (res.code || '') + ')');
        identifierEl.value = '';
        selectedPersonId = '';
        setMessage('ok', '簽到成功: ' + ((res.data && res.data.personName) || ''));
      } catch (e) {
        setMessage('err', '送出失敗: ' + e.message);
      } finally {
        btnSubmit.disabled = false;
      }
    }

    function randHex() {
      const arr = new Uint8Array(8);
      crypto.getRandomValues(arr);
      return Array.from(arr).map(x => x.toString(16).padStart(2, '0')).join('');
    }

    function getDeviceId() {
      const key = 'checkin_device_id';
      let id = localStorage.getItem(key);
      if (!id) {
        id = 'd_' + randHex();
        localStorage.setItem(key, id);
      }
      return id;
    }

    async function startScan() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setMessage('err', '此瀏覽器不支援相機，請手動貼上 QR');
        return;
      }

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } },
          audio: false
        });
        videoEl.srcObject = stream;
        videoEl.style.display = 'block';
        await videoEl.play();

        btnStart.disabled = true;
        btnStop.disabled = false;
        scanHintEl.textContent = '掃描中...';

        if ('BarcodeDetector' in window) {
          const detector = new BarcodeDetector({ formats: ['qr_code'] });
          scanTimer = setInterval(async () => {
            if (!videoEl.videoWidth) return;
            try {
              const codes = await detector.detect(videoEl);
              if (!codes || !codes.length) return;
              const raw = String(codes[0].rawValue || '').trim();
              if (!raw) return;
              identifierEl.value = raw;
              stopScan();
              submitCheckin(true);
            } catch (error) {
              // Keep scanning when detector throws intermittent frame errors.
            }
          }, 350);
          scanHintEl.textContent = '二維 QR code 掃描中...';
        } else {
          scanHintEl.textContent = '此瀏覽器不支援即時 QR 偵測，請手動貼上 QR';
        }
      } catch (e) {
        setMessage('err', '啟動相機失敗: ' + (e.message || e.name));
        stopScan();
      }
    }

    function stopScan() {
      if (scanTimer) {
        clearInterval(scanTimer);
        scanTimer = null;
      }
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      videoEl.pause();
      videoEl.srcObject = null;
      videoEl.style.display = 'none';
      btnStart.disabled = false;
      btnStop.disabled = true;
      scanHintEl.textContent = '先按開始掃描，或手動貼上 QR 內容。';
    }

    // ===== 領隊模式函數 =====

    async function verifyLeader() {
      const phone = leaderPhoneEl.value.trim();
      if (!phone) {
        setMessage('err', '請輸入領隊手機號碼');
        return false;
      }

      localStorage.setItem('leader_phone_number', phone);
      btnVerifyLeader.disabled = true;
      leaderVerifyingEl.style.display = 'block';
      leaderVerifiedEl.style.display = 'none';
      leaderEventsEl.innerHTML = '';
      leaderStationsEl.innerHTML = '';
      leaderRosterEl.innerHTML = '';
      leaderSummaryContainerEl.style.display = 'none';
      resetLeaderState();
      setMessage('ok', '驗證中...');

      try {
        const res = await apiCall({
          intent: 'discover_leader_events',
          leaderPhoneNumber: phone
        });
        if (!res.ok) throw new Error(res.message || '驗證失敗');

        currentLeaderData = res.data;
        leaderVerifyingEl.style.display = 'none';
        leaderVerifiedEl.style.display = 'block';
        renderLeaderEvents();

        const items = (currentLeaderData && currentLeaderData.items) || [];
        const preferredEventCode = launchParams.eventCode || (currentLeaderData && currentLeaderData.preferredEventCode) || '';
        const preferredEvent = items.find(e => e.eventCode === preferredEventCode) || items[0] || null;

        if (preferredEvent) {
          await selectLeaderEvent(preferredEvent, launchParams.rollCallCode || '');
          setMessage('ok', '驗證成功，已載入指定活動與站點');
        } else {
          setMessage('ok', '驗證成功，請選擇活動');
        }
        return true;
      } catch (e) {
        setMessage('err', '驗證失敗: ' + e.message);
        leaderVerifyingEl.style.display = 'none';
        return false;
      } finally {
        btnVerifyLeader.disabled = false;
      }
    }

    function renderLeaderEvents() {
      if (!currentLeaderData || !currentLeaderData.items) return;

      leaderEventsEl.innerHTML = '';
      const frag = document.createDocumentFragment();

      currentLeaderData.items.forEach(event => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'result-item';
        btn.textContent = event.eventName + ' (' + event.eventCode + ')';
        btn.addEventListener('click', () => selectLeaderEvent(event));
        frag.appendChild(btn);
      });

      leaderEventsEl.appendChild(frag);
    }

    async function selectLeaderEvent(event, preferredRollCallCode) {
      currentEvent = event;
      resetLeaderState();
      setMessage('ok', '載入站點中...');
      await loadLeaderStations(event.eventCode, preferredRollCallCode || '');
    }

    function resetLeaderState() {
      currentRollCallCode = '';
      currentRollCallName = '';
      selectedIds = {};
      pendingRecords = {};
      if (currentLeaderData) {
        currentLeaderData.members = [];
        currentLeaderData.stations = [];
      }
      arrivedCountEl.textContent = '0';
      totalCountEl.textContent = '0';
      updateLeaderActionUi();
    }

    async function loadLeaderStations(eventCode, preferredRollCallCode) {
      if (!eventCode) {
        setMessage('err', '缺少活動代碼');
        return;
      }

      try {
        const res = await apiCall({
          intent: 'leader_stations',
          eventCode,
          leaderPhoneNumber: leaderPhoneEl.value.trim(),
          deviceId: getDeviceId(),
          requestId: 'r_' + randHex(),
          nonce: 'n_' + randHex(),
          clientTimestamp: new Date().toISOString(),
          source: 'git-static-web',
          userAgent: navigator.userAgent
        });

        if (!res.ok) throw new Error(res.message || '載入站點失敗');

        const stations = (res.data && res.data.stations) || [];
        currentLeaderData.stations = stations;
        renderLeaderStations(stations);

        if (stations.length === 0) {
          leaderSummaryContainerEl.style.display = 'none';
          leaderRosterEl.innerHTML = '<div class="hint">目前無可用站點</div>';
          setMessage('err', '這個活動目前沒有站點資料');
          return;
        }

        const savedKey = 'leader_station_' + eventCode;
        const savedStation = localStorage.getItem(savedKey) || '';
        const fromUrl = String(preferredRollCallCode || '').trim();
        const preferred = stations.find(s => s.rollCallCode === fromUrl) ||
          stations.find(s => s.rollCallCode === savedStation) ||
          stations[0];
        await chooseLeaderStation(preferred);
      } catch (e) {
        setMessage('err', '載入站點失敗: ' + e.message);
      }
    }

    function renderLeaderStations(stations) {
      leaderStationsEl.innerHTML = '';
      const frag = document.createDocumentFragment();

      stations.forEach(station => {
        const btn = document.createElement('button');
        const summary = station.summary || {};
        btn.type = 'button';
        btn.className = 'station-btn' + (station.rollCallCode === currentRollCallCode ? ' active' : '');
        btn.innerHTML = '<strong>' + escapeHtml(station.rollCallName || station.rollCallCode) + '</strong>' +
          '<div class="hint">' + escapeHtml(station.rollCallCode || '') + ' | 已到 ' +
          String(summary.arrived || 0) + ' / ' + String(summary.total || 0) + '</div>';
        btn.addEventListener('click', () => chooseLeaderStation(station));
        frag.appendChild(btn);
      });

      leaderStationsEl.appendChild(frag);
    }

    async function chooseLeaderStation(station) {
      if (!station || !station.rollCallCode || !currentEvent) {
        return;
      }

      currentRollCallCode = station.rollCallCode;
      currentRollCallName = station.rollCallName || station.rollCallCode;
      selectedIds = {};
      pendingRecords = {};
      localStorage.setItem('leader_station_' + currentEvent.eventCode, currentRollCallCode);
      renderLeaderStations(currentLeaderData.stations || []);
      setMessage('ok', '載入站點名單中...');
      await fetchLeaderSummary();
    }

    async function fetchLeaderSummary() {
      if (!currentEvent || !currentRollCallCode) {
        return;
      }

      const res = await apiCall({
        intent: 'leader_summary',
        eventCode: currentEvent.eventCode,
        rollCallCode: currentRollCallCode,
        leaderPhoneNumber: leaderPhoneEl.value.trim(),
        deviceId: getDeviceId(),
        requestId: 'r_' + randHex(),
        nonce: 'n_' + randHex(),
        clientTimestamp: new Date().toISOString(),
        source: 'git-static-web',
        userAgent: navigator.userAgent
      });

      if (!res.ok) {
        throw new Error(res.message || '載入名單失敗');
      }

      renderLeaderSummary(res.data);
      leaderSummaryContainerEl.style.display = 'block';
      setMessage('ok', currentRollCallName + ' 已就緒，可直接勾選名單');
    }

    function renderLeaderSummary(data) {
      const members = applyPendingRecords(data.members || []);
      const arrived = members.filter(m => m.status === 'arrived').length;
      const total = members.length;

      arrivedCountEl.textContent = arrived;
      totalCountEl.textContent = total;

      currentLeaderData.members = members;
      renderLeaderRoster();
      updateLeaderActionUi();
    }

    function applyPendingRecords(members) {
      return members.map(member => {
        const pending = pendingRecords[member.personId];
        if (!pending) {
          return member;
        }
        return {
          ...member,
          status: pending.status === 'present' ? 'arrived' : 'pending',
          arrivedAt: pending.status === 'present' ? pending.clientTimestamp : ''
        };
      });
    }

    function renderLeaderRoster() {
      if (!currentLeaderData || !currentLeaderData.members) return;

      leaderRosterEl.innerHTML = '';
      const frag = document.createDocumentFragment();

      const filtered = currentLeaderData.members.filter(member => {
        if (currentFilter === 'all') return true;
        if (currentFilter === 'arrived') return member.status === 'arrived' || member.status === 'leave';
        if (currentFilter === 'pending') return member.status === 'pending';
        return true;
      });

      if (!filtered.length) {
        leaderRosterEl.innerHTML = '<div class="hint">目前篩選條件下沒有名單</div>';
        updateLeaderActionUi();
        return;
      }

      filtered.forEach(member => {
        const item = document.createElement('div');
        item.className = 'roster-item ' + member.status;

        const isArrived = member.status === 'arrived';
        const isSelected = !!selectedIds[member.personId];
        const statusText = isArrived ? '✓ 已到' : (member.status === 'pending' ? '未到' : '假');
        const roomText = member.roomNo ? '房: ' + member.roomNo : '';
        const carText = member.carNo ? '車: ' + member.carNo : '';

        const pick = document.createElement('input');
        pick.type = 'checkbox';
        pick.className = 'member-pick';
        pick.checked = isArrived || isSelected;
        pick.disabled = isArrived;
        pick.addEventListener('change', () => toggleMemberSelection(member.personId));
        item.appendChild(pick);

        const main = document.createElement('div');
        main.className = 'member-main';
        main.innerHTML = `
          <div class="roster-name">${escapeHtml(member.personName || '')}</div>
          <div class="roster-info">${escapeHtml([roomText, carText].filter(Boolean).join(' '))}</div>
          <div class="roster-status">${escapeHtml(statusText)}</div>
        `;
        item.appendChild(main);

        const action = document.createElement('button');
        action.type = 'button';
        action.className = 'member-action' + (isArrived ? ' undo' : '');
        action.textContent = isArrived ? '改未到' : '標已到';
        action.addEventListener('click', () => {
          queueMemberStatus(member.personId, isArrived ? 'pending' : 'arrived');
        });
        item.appendChild(action);

        frag.appendChild(item);
      });

      leaderRosterEl.appendChild(frag);
      updateLeaderActionUi();
    }

    function toggleMemberSelection(personId) {
      if (selectedIds[personId]) {
        delete selectedIds[personId];
      } else {
        selectedIds[personId] = true;
      }
      updateLeaderActionUi();
    }

    function queueMemberStatus(personId, nextStatus) {
      const member = (currentLeaderData.members || []).find(m => m.personId === personId);
      if (!member) {
        return;
      }

      const now = new Date().toISOString();
      const queueStatus = nextStatus === 'arrived' ? 'present' : 'absent';
      pendingRecords[personId] = {
        requestId: 'r_' + randHex(),
        personId,
        status: queueStatus,
        clientTimestamp: now,
        nonce: 'n_' + randHex()
      };

      if (nextStatus !== 'arrived') {
        delete selectedIds[personId];
      }

      currentLeaderData.members = currentLeaderData.members.map(m => {
        if (m.personId !== personId) {
          return m;
        }
        return {
          ...m,
          status: nextStatus,
          arrivedAt: nextStatus === 'arrived' ? now : ''
        };
      });

      arrivedCountEl.textContent = String((currentLeaderData.members || []).filter(m => m.status === 'arrived').length);
      totalCountEl.textContent = String((currentLeaderData.members || []).length);
      renderLeaderRoster();
    }

    function markSelectedAsArrived() {
      const ids = Object.keys(selectedIds);
      if (!ids.length) {
        setMessage('err', '請先勾選未到人員');
        return;
      }

      ids.forEach(personId => {
        queueMemberStatus(personId, 'arrived');
        delete selectedIds[personId];
      });

      renderLeaderRoster();
      setMessage('ok', '已先在本機標記 ' + ids.length + ' 人，請按同步');
    }

    async function syncLeaderChanges() {
      if (!currentEvent || !currentRollCallCode) {
        setMessage('err', '請先選擇活動與站點');
        return;
      }

      const records = Object.values(pendingRecords);
      if (!records.length) {
        setMessage('ok', '沒有待同步資料');
        return;
      }

      btnSyncLeader.disabled = true;
      setMessage('ok', '同步中...');

      try {
        const res = await apiCall({
          intent: 'leader_sync',
          requestId: 'r_' + randHex(),
          eventCode: currentEvent.eventCode,
          rollCallCode: currentRollCallCode,
          leaderPhoneNumber: leaderPhoneEl.value.trim(),
          deviceId: getDeviceId(),
          nonce: 'n_' + randHex(),
          clientTimestamp: new Date().toISOString(),
          source: 'git-static-web',
          userAgent: navigator.userAgent,
          records: JSON.stringify(records.map(r => ({
            requestId: r.requestId,
            personId: r.personId,
            customer_id: r.personId,
            status: r.status,
            clientTimestamp: r.clientTimestamp,
            client_timestamp: r.clientTimestamp,
            nonce: r.nonce
          })))
        });

        if (!res.ok) throw new Error(res.message || '同步失敗');

        ((res.data && res.data.accepted) || []).forEach(item => {
          delete pendingRecords[item.personId];
        });
        ((res.data && res.data.rejected) || []).forEach(item => {
          delete pendingRecords[item.personId];
        });

        await fetchLeaderSummary();
        setMessage('ok', res.message || '同步完成');
      } catch (e) {
        setMessage('err', '同步失敗: ' + e.message);
      } finally {
        btnSyncLeader.disabled = false;
        updateLeaderActionUi();
      }
    }

    function updateLeaderActionUi() {
      const selectedCount = Object.keys(selectedIds).length;
      const pendingCount = Object.keys(pendingRecords).length;

      btnMarkSelected.textContent = selectedCount ? ('標記勾選為已到 (' + selectedCount + ')') : '標記勾選為已到';
      btnMarkSelected.disabled = selectedCount === 0;

      btnSyncLeader.textContent = '同步變更 (' + pendingCount + ')';
      btnSyncLeader.disabled = pendingCount === 0;
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
